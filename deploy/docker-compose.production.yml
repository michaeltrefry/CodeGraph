services:
  codegraph-api:
    image: ${IMAGE_PREFIX:-ghcr.io/tc-trefry/codegraph}-api:${IMAGE_TAG:-latest}
    build: null
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      CodeGraph__AuthOptions__Enabled: ${CodeGraph__AuthOptions__Enabled:-true}
      CodeGraph__AuthOptions__Authority: ${CodeGraph__AuthOptions__Authority:-https://identity.trefry.net/realms/trefry}
      CodeGraph__AuthOptions__Audience: ${CodeGraph__AuthOptions__Audience:-codegraph-api}
      CodeGraph__AuthOptions__ClientId: ${CodeGraph__AuthOptions__ClientId:-codegraph-web}
      CodeGraph__AuthOptions__Scope: ${CodeGraph__AuthOptions__Scope:-openid profile email}
      CodeGraph__AuthOptions__AllowedOrigins__0: ${CodeGraph__AuthOptions__AllowedOrigins__0:-https://codegraph.trefry.net}
      CodeGraph__AuthOptions__RequireHttpsMetadata: ${CodeGraph__AuthOptions__RequireHttpsMetadata:-true}
      CodeGraph__McpOptions__RequirePersonalAccessToken: ${CodeGraph__McpOptions__RequirePersonalAccessToken:-true}
      CodeGraph__Indexer__BaseUrl: ${CodeGraph__Indexer__BaseUrl:-http://codegraph-indexer:5042}
      CodeGraph__Indexer__Audience: ${CodeGraph__Indexer__Audience:-codegraph-indexer}
      CodeGraph__Memory__BaseUrl: ${CodeGraph__Memory__BaseUrl:-http://codegraph-memory:5039}
      CodeGraph__Memory__Audience: ${CodeGraph__Memory__Audience:-codegraph-memory}
      CodeGraph__InternalServiceAuth__Enabled: ${CodeGraph__InternalServiceAuth__Enabled:-true}
      CodeGraph__InternalServiceAuth__HmacKey: ${CodeGraph__InternalServiceAuth__HmacKey:-}

  codegraph-indexer:
    image: ${IMAGE_PREFIX:-ghcr.io/tc-trefry/codegraph}-indexer:${IMAGE_TAG:-latest}
    build: null
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      CodeGraph__InternalServiceAuth__Enabled: ${CodeGraph__InternalServiceAuth__Enabled:-true}
      CodeGraph__InternalServiceAuth__HmacKey: ${CodeGraph__InternalServiceAuth__HmacKey:-}

  codegraph-memory:
    image: ${IMAGE_PREFIX:-ghcr.io/tc-trefry/codegraph}-memory:${IMAGE_TAG:-latest}
    build: null
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      CodeGraph__InternalServiceAuth__Enabled: ${CodeGraph__InternalServiceAuth__Enabled:-true}
      CodeGraph__InternalServiceAuth__HmacKey: ${CodeGraph__InternalServiceAuth__HmacKey:-}

  codegraph-metrics:
    image: ${IMAGE_PREFIX:-ghcr.io/tc-trefry/codegraph}-metrics:${IMAGE_TAG:-latest}
    build: null
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      CodeGraph__InternalServiceAuth__Enabled: ${CodeGraph__InternalServiceAuth__Enabled:-true}
      CodeGraph__InternalServiceAuth__HmacKey: ${CodeGraph__InternalServiceAuth__HmacKey:-}

  jobs:
    image: ${IMAGE_PREFIX:-ghcr.io/tc-trefry/codegraph}-jobs:${IMAGE_TAG:-latest}
    build: null
    environment:
      DOTNET_ENVIRONMENT: ${DOTNET_ENVIRONMENT:-Production}
      CodeGraph__Indexer__BaseUrl: ${CodeGraph__Indexer__BaseUrl:-http://codegraph-indexer:5042}
      CodeGraph__Indexer__Audience: ${CodeGraph__Indexer__Audience:-codegraph-indexer}
      CodeGraph__InternalServiceAuth__Enabled: ${CodeGraph__InternalServiceAuth__Enabled:-true}
      CodeGraph__InternalServiceAuth__HmacKey: ${CodeGraph__InternalServiceAuth__HmacKey:-}

  codegraph-web:
    image: ${IMAGE_PREFIX:-ghcr.io/tc-trefry/codegraph}-web:${IMAGE_TAG:-latest}
    build: null
