name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'codex/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CodeGraph.sln

      - name: Build
        run: dotnet build CodeGraph.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test CodeGraph.sln --configuration Release --no-build --verbosity normal

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CodeGraphWeb
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: CodeGraphWeb/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test -- --watch=false

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser smoke
        run: npm run test:browser

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: codegraph-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build jobs image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.jobs
          push: false
          tags: codegraph-jobs:ci
          cache-from: type=gha,scope=jobs
          cache-to: type=gha,scope=jobs,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: CodeGraphWeb
          file: CodeGraphWeb/Dockerfile
          push: false
          tags: codegraph-web:ci
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
