name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/codegraph

jobs:
  publish:
    name: Publish Images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image-tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build and push jobs image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.jobs
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-jobs:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-jobs:latest
          cache-from: type=gha,scope=jobs
          cache-to: type=gha,scope=jobs,mode=max

      - name: Build and push indexer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.indexer
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-indexer:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-indexer:latest
          cache-from: type=gha,scope=indexer
          cache-to: type=gha,scope=indexer,mode=max

      - name: Build and push memory image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.memory
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-memory:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-memory:latest
          cache-from: type=gha,scope=memory
          cache-to: type=gha,scope=memory,mode=max

      - name: Build and push metrics image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.metrics
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-metrics:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-metrics:latest
          cache-from: type=gha,scope=metrics
          cache-to: type=gha,scope=metrics,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: CodeGraphWeb
          file: CodeGraphWeb/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: publish
    environment: production
    steps:
      - name: Check deployment gate
        id: deploy-gate
        env:
          CODEGRAPH_DEPLOY_ENABLED: ${{ vars.CODEGRAPH_DEPLOY_ENABLED }}
        run: |
          if [ "$CODEGRAPH_DEPLOY_ENABLED" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Production deployment is disabled. Set CODEGRAPH_DEPLOY_ENABLED=true on the production environment to enable it." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Checkout
        if: steps.deploy-gate.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        if: steps.deploy-gate.outputs.enabled == 'true'
        env:
          CODEGRAPH_DEPLOY_HOST: ${{ vars.CODEGRAPH_DEPLOY_HOST || secrets.CODEGRAPH_DEPLOY_HOST }}
          CODEGRAPH_DEPLOY_PATH: ${{ vars.CODEGRAPH_DEPLOY_PATH || secrets.CODEGRAPH_DEPLOY_PATH }}
          CODEGRAPH_DEPLOY_SSH_KEY: ${{ secrets.CODEGRAPH_DEPLOY_SSH_KEY }}
          CODEGRAPH_DEPLOY_SSH_KEY_B64: ${{ secrets.CODEGRAPH_DEPLOY_SSH_KEY_B64 }}
          CODEGRAPH_DEPLOY_USER: ${{ vars.CODEGRAPH_DEPLOY_USER || secrets.CODEGRAPH_DEPLOY_USER }}
          CODEGRAPH__INTERNALSERVICEAUTH__HMACKEY: ${{ secrets.CODEGRAPH__INTERNALSERVICEAUTH__HMACKEY }}
          CODEGRAPH__RABBITMQOPTIONS__PASSWORD: ${{ secrets.CODEGRAPH__RABBITMQOPTIONS__PASSWORD }}
          CODEGRAPH__RABBITMQOPTIONS__USERNAME: ${{ secrets.CODEGRAPH__RABBITMQOPTIONS__USERNAME }}
          CODEGRAPH__REPOSITORYSOURCE__GITHUB__PERSONALACCESSTOKEN: ${{ secrets.CODEGRAPH__REPOSITORYSOURCE__GITHUB__PERSONALACCESSTOKEN }}
          CODEGRAPH__STORAGEOPTIONS__MARIADBCONNECTIONSTRING: ${{ secrets.CODEGRAPH__STORAGEOPTIONS__MARIADBCONNECTIONSTRING }}
          CODEGRAPH__STORAGEOPTIONS__MARIADBENCRYPTIONKEY: ${{ secrets.CODEGRAPH__STORAGEOPTIONS__MARIADBENCRYPTIONKEY }}
        run: |
          missing=0
          for name in \
            CODEGRAPH_DEPLOY_HOST \
            CODEGRAPH_DEPLOY_PATH \
            CODEGRAPH_DEPLOY_USER \
            CODEGRAPH__INTERNALSERVICEAUTH__HMACKEY \
            CODEGRAPH__RABBITMQOPTIONS__PASSWORD \
            CODEGRAPH__RABBITMQOPTIONS__USERNAME \
            CODEGRAPH__REPOSITORYSOURCE__GITHUB__PERSONALACCESSTOKEN \
            CODEGRAPH__STORAGEOPTIONS__MARIADBCONNECTIONSTRING \
            CODEGRAPH__STORAGEOPTIONS__MARIADBENCRYPTIONKEY; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for production deployment"
              missing=1
            fi
          done

          if [ -z "$CODEGRAPH_DEPLOY_SSH_KEY" ] && [ -z "$CODEGRAPH_DEPLOY_SSH_KEY_B64" ]; then
            echo "::error::CODEGRAPH_DEPLOY_SSH_KEY or CODEGRAPH_DEPLOY_SSH_KEY_B64 is required for production deployment"
            missing=1
          fi

          exit "$missing"

      - name: Create production environment file
        if: steps.deploy-gate.outputs.enabled == 'true'
        env:
          ACTIONS_VARS_JSON: ${{ toJson(vars) }}
          SECRET_INTERNAL_SERVICE_AUTH_HMAC_KEY: ${{ secrets.CODEGRAPH__INTERNALSERVICEAUTH__HMACKEY }}
          SECRET_RABBITMQ_PASSWORD: ${{ secrets.CODEGRAPH__RABBITMQOPTIONS__PASSWORD }}
          SECRET_RABBITMQ_USERNAME: ${{ secrets.CODEGRAPH__RABBITMQOPTIONS__USERNAME }}
          SECRET_REPOSITORY_GITHUB_PAT: ${{ secrets.CODEGRAPH__REPOSITORYSOURCE__GITHUB__PERSONALACCESSTOKEN }}
          SECRET_REPOSITORY_GITLAB_TOKEN: ${{ secrets.CODEGRAPH__REPOSITORYSOURCE__GITLAB__PRIVATETOKEN }}
          SECRET_STORAGE_MARIADB_CONNECTION_STRING: ${{ secrets.CODEGRAPH__STORAGEOPTIONS__MARIADBCONNECTIONSTRING }}
          SECRET_STORAGE_MARIADB_ENCRYPTION_KEY: ${{ secrets.CODEGRAPH__STORAGEOPTIONS__MARIADBENCRYPTIONKEY }}
        run: |
          python3 <<'PY'
          import json
          import os

          segment_names = {
              "ANALYSISOPTIONS": "AnalysisOptions",
              "ALLOWEDORIGINS": "AllowedOrigins",
              "ANTHROPIC": "Anthropic",
              "APIKEY": "ApiKey",
              "ASSISTANT": "Assistant",
              "AUDIENCE": "Audience",
              "AUTHOPTIONS": "AuthOptions",
              "AUTHORITY": "Authority",
              "AUTHORIZATIONURL": "AuthorizationUrl",
              "BASEURL": "BaseUrl",
              "CHATCOMPLETIONSPATH": "ChatCompletionsPath",
              "CLIENTID": "ClientId",
              "DEFAULTPROVIDER": "DefaultProvider",
              "DIRECTFALLBACKMAXATTEMPTS": "DirectFallbackMaxAttempts",
              "EMBEDDINGMODELNAME": "EmbeddingModelName",
              "EMBEDDINGMODELPATH": "EmbeddingModelPath",
              "ENABLED": "Enabled",
              "ENDSESSIONURL": "EndSessionUrl",
              "FOLDER": "Folder",
              "GITHUB": "GitHub",
              "GITLAB": "GitLab",
              "HMACKEY": "HmacKey",
              "HOST": "Host",
              "INDEXER": "Indexer",
              "INDEXINGOPTIONS": "IndexingOptions",
              "INTERNALSERVICEAUTH": "InternalServiceAuth",
              "ISSUER": "Issuer",
              "LOCAL": "Local",
              "LOCALDEVISADMIN": "LocalDevIsAdmin",
              "LOCALDEVUSERNAME": "LocalDevUsername",
              "LMSTUDIO": "LmStudio",
              "MARIADBCONNECTIONSTRING": "MariaDbConnectionString",
              "MARIADBENCRYPTIONKEY": "MariaDbEncryptionKey",
              "MARIADBMIGRATIONSPATH": "MariaDbMigrationsPath",
              "MAXCONCURRENTREQUESTS": "MaxConcurrentRequests",
              "MAXPARALLELFILES": "MaxParallelFiles",
              "MAXPROMPTNODES": "MaxPromptNodes",
              "MAXRELATIONSHIPTARGETSPERTYPE": "MaxRelationshipTargetsPerType",
              "MAXSOURCECHARS": "MaxSourceChars",
              "MAXTOKENS": "MaxTokens",
              "MAXTURNS": "MaxTurns",
              "MCPOPTIONS": "McpOptions",
              "MEMORY": "Memory",
              "MODEL": "Model",
              "OPENAI": "OpenAi",
              "ORGANIZATION": "Organization",
              "PASSWORD": "Password",
              "PERSONALACCESSTOKEN": "PersonalAccessToken",
              "PRIVATETOKEN": "PrivateToken",
              "PROJECT": "Project",
              "PROVIDER": "Provider",
              "RABBITMQOPTIONS": "RabbitMqOptions",
              "REPOSCACHEPATH": "ReposCachePath",
              "REPOSITORYSOURCE": "RepositorySource",
              "REQUIREHTTPSMETADATA": "RequireHttpsMetadata",
              "REQUIREPERSONALACCESSTOKEN": "RequirePersonalAccessToken",
              "ROOTPATH": "RootPath",
              "SCOPE": "Scope",
              "STORAGEOPTIONS": "StorageOptions",
              "TIMEOUTSECONDS": "TimeoutSeconds",
              "TOKENURL": "TokenUrl",
              "TSPORT": "TsPort",
              "USERNAME": "Username",
              "USEJSONOBJECTRESPONSEFORMAT": "UseJsonObjectResponseFormat",
          }

          analysis_options_appsettings_allowlist = {
              "AUTOCOMMITDOCS",
              "AUTOPUSHDOCS",
              "AUTOCOMMITMESSAGE",
              "AUTOCOMMITAUTHORNAME",
              "AUTOCOMMITAUTHOREMAIL",
          }

          pass_through_names = {
              "ASPNETCORE_ENVIRONMENT",
              "CODEGRAPHAPI_DOCKER_HTTPS_PORT",
              "CODEGRAPH_DOCKER_LEGACY_MODELS_MOUNT",
              "CODEGRAPH_DOCKER_MODELS_MOUNT",
              "CODEGRAPH_DOCKER_HTTP_PORT",
              "CODEGRAPH_DOCKER_REPOS_MOUNT",
              "CODEGRAPH_INDEXER_DOCKER_HTTP_PORT",
              "CODEGRAPH_MEMORY_DOCKER_HTTP_PORT",
              "CODEGRAPH_METRICS_DOCKER_HTTP_PORT",
              "CODEGRAPH_SKIP_TS_SIDECAR_WARMUP",
              "DOTNET_ENVIRONMENT",
          }

          secret_mappings = {
              "CodeGraph__InternalServiceAuth__HmacKey": "SECRET_INTERNAL_SERVICE_AUTH_HMAC_KEY",
              "CodeGraph__RabbitMqOptions__Password": "SECRET_RABBITMQ_PASSWORD",
              "CodeGraph__RabbitMqOptions__Username": "SECRET_RABBITMQ_USERNAME",
              "CodeGraph__RepositorySource__GitHub__PersonalAccessToken": "SECRET_REPOSITORY_GITHUB_PAT",
              "CodeGraph__RepositorySource__GitLab__PrivateToken": "SECRET_REPOSITORY_GITLAB_TOKEN",
              "CodeGraph__StorageOptions__MariaDbConnectionString": "SECRET_STORAGE_MARIADB_CONNECTION_STRING",
              "CodeGraph__StorageOptions__MariaDbEncryptionKey": "SECRET_STORAGE_MARIADB_ENCRYPTION_KEY",
          }

          def compose_key(name):
              if not name.startswith("CODEGRAPH__"):
                  return name

              parts = name.split("__")[1:]
              converted = []
              for part in parts:
                  if part.isdigit():
                      converted.append(part)
                      continue
                  converted.append(segment_names.get(part, part))

              return "CodeGraph__" + "__".join(converted)

          def is_production_llm_runtime_setting(name):
              if not name.upper().startswith("CODEGRAPH__ANALYSISOPTIONS__"):
                  return False

              parts = name.upper().split("__")[2:]
              if not parts:
                  return False

              return parts[0] not in analysis_options_appsettings_allowlist

          def dotenv_value(value):
              return "'" + value.replace("'", "\\'") + "'"

          entries = {
              "ASPNETCORE_ENVIRONMENT": "Production",
              "DOTNET_ENVIRONMENT": "Production",
          }

          action_vars = json.loads(os.environ.get("ACTIONS_VARS_JSON") or "{}")
          for name, value in action_vars.items():
              if value is None or value == "":
                  continue
              if name.startswith("CODEGRAPH_DEPLOY"):
                  continue
              if is_production_llm_runtime_setting(name):
                  print(f"::notice::Skipping {name}; configure LLM providers, models, and caps in the LLM Configuration admin page.")
                  continue
              if name.startswith("CODEGRAPH__"):
                  entries[compose_key(name)] = value
              elif name in pass_through_names:
                  entries[name] = value

          for target_name, env_name in secret_mappings.items():
              value = os.environ.get(env_name)
              if value:
                  entries[target_name] = value

          with open(".env.production", "w", encoding="utf-8") as env_file:
              for name in sorted(entries):
                  env_file.write(f"{name}={dotenv_value(entries[name])}\n")
          PY

      - name: Prepare SSH key
        if: steps.deploy-gate.outputs.enabled == 'true'
        env:
          CODEGRAPH_DEPLOY_HOST: ${{ vars.CODEGRAPH_DEPLOY_HOST || secrets.CODEGRAPH_DEPLOY_HOST }}
          CODEGRAPH_DEPLOY_SSH_KEY: ${{ secrets.CODEGRAPH_DEPLOY_SSH_KEY }}
          CODEGRAPH_DEPLOY_SSH_KEY_B64: ${{ secrets.CODEGRAPH_DEPLOY_SSH_KEY_B64 }}
          CODEGRAPH_DEPLOY_SSH_KEY_PASSPHRASE: ${{ secrets.CODEGRAPH_DEPLOY_SSH_KEY_PASSPHRASE }}
        run: |
          set -eu
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "$CODEGRAPH_DEPLOY_SSH_KEY" ]; then
            printf '%s\n' "$CODEGRAPH_DEPLOY_SSH_KEY" > ~/.ssh/codegraph_deploy
          else
            echo "$CODEGRAPH_DEPLOY_SSH_KEY_B64" | base64 -d > ~/.ssh/codegraph_deploy
          fi
          chmod 600 ~/.ssh/codegraph_deploy

          eval "$(ssh-agent -s)" >/dev/null
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

          if [ -n "$CODEGRAPH_DEPLOY_SSH_KEY_PASSPHRASE" ]; then
            export DISPLAY=":0"
            askpass="$(mktemp)"
            cat > "$askpass" <<'EOF'
          #!/bin/sh
          printf '%s' "$CODEGRAPH_DEPLOY_SSH_KEY_PASSPHRASE"
          EOF
            chmod 700 "$askpass"
            export SSH_ASKPASS="$askpass"
            setsid -w ssh-add ~/.ssh/codegraph_deploy < /dev/null
            rm -f "$askpass"
          else
            ssh-add ~/.ssh/codegraph_deploy
          fi

          ssh-keyscan -H "$CODEGRAPH_DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Verify SSH access
        if: steps.deploy-gate.outputs.enabled == 'true'
        env:
          CODEGRAPH_DEPLOY_HOST: ${{ vars.CODEGRAPH_DEPLOY_HOST || secrets.CODEGRAPH_DEPLOY_HOST }}
          CODEGRAPH_DEPLOY_USER: ${{ vars.CODEGRAPH_DEPLOY_USER || secrets.CODEGRAPH_DEPLOY_USER }}
        run: |
          set -eu
          echo "Deploy target: ${CODEGRAPH_DEPLOY_USER}@${CODEGRAPH_DEPLOY_HOST}"
          ssh-add -l
          ssh -o BatchMode=yes -o PasswordAuthentication=no -o PubkeyAuthentication=yes \
            -o StrictHostKeyChecking=yes \
            "$CODEGRAPH_DEPLOY_USER@$CODEGRAPH_DEPLOY_HOST" \
            'echo "ssh ok: $(hostname) $(uname -srm)"'

      - name: Sync deployment files
        if: steps.deploy-gate.outputs.enabled == 'true'
        env:
          CODEGRAPH_DEPLOY_HOST: ${{ vars.CODEGRAPH_DEPLOY_HOST || secrets.CODEGRAPH_DEPLOY_HOST }}
          CODEGRAPH_DEPLOY_PATH: ${{ vars.CODEGRAPH_DEPLOY_PATH || secrets.CODEGRAPH_DEPLOY_PATH }}
          CODEGRAPH_DEPLOY_USER: ${{ vars.CODEGRAPH_DEPLOY_USER || secrets.CODEGRAPH_DEPLOY_USER }}
        run: |
          set -eu
          ssh -o BatchMode=yes -o StrictHostKeyChecking=yes "$CODEGRAPH_DEPLOY_USER@$CODEGRAPH_DEPLOY_HOST" "mkdir -p '$CODEGRAPH_DEPLOY_PATH/docker'"
          scp -o BatchMode=yes -o StrictHostKeyChecking=yes docker-compose.yml deploy/docker-compose.production.yml "$CODEGRAPH_DEPLOY_USER@$CODEGRAPH_DEPLOY_HOST:$CODEGRAPH_DEPLOY_PATH/"
          scp -o BatchMode=yes -o StrictHostKeyChecking=yes docker/Directory.Build.props "$CODEGRAPH_DEPLOY_USER@$CODEGRAPH_DEPLOY_HOST:$CODEGRAPH_DEPLOY_PATH/docker/Directory.Build.props"
          scp -o BatchMode=yes -o StrictHostKeyChecking=yes .env.production "$CODEGRAPH_DEPLOY_USER@$CODEGRAPH_DEPLOY_HOST:$CODEGRAPH_DEPLOY_PATH/.env"

      - name: Deploy over SSH
        if: steps.deploy-gate.outputs.enabled == 'true'
        env:
          CODEGRAPH_DEPLOY_HOST: ${{ vars.CODEGRAPH_DEPLOY_HOST || secrets.CODEGRAPH_DEPLOY_HOST }}
          CODEGRAPH_DEPLOY_PATH: ${{ vars.CODEGRAPH_DEPLOY_PATH || secrets.CODEGRAPH_DEPLOY_PATH }}
          CODEGRAPH_DEPLOY_USER: ${{ vars.CODEGRAPH_DEPLOY_USER || secrets.CODEGRAPH_DEPLOY_USER }}
          IMAGE_TAG: ${{ needs.publish.outputs.image-tag }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          ssh -o BatchMode=yes -o StrictHostKeyChecking=yes "$CODEGRAPH_DEPLOY_USER@$CODEGRAPH_DEPLOY_HOST" \
            "cd '$CODEGRAPH_DEPLOY_PATH' && \
             echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin && \
             IMAGE_PREFIX='$IMAGE_PREFIX' IMAGE_TAG='$IMAGE_TAG' docker compose -f docker-compose.yml -f docker-compose.production.yml pull && \
             IMAGE_PREFIX='$IMAGE_PREFIX' IMAGE_TAG='$IMAGE_TAG' docker compose -f docker-compose.yml -f docker-compose.production.yml up -d --no-build --remove-orphans"
