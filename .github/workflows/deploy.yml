name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/codegraph

jobs:
  publish:
    name: Publish Images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image-tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build and push jobs image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.jobs
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-jobs:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-jobs:latest
          cache-from: type=gha,scope=jobs
          cache-to: type=gha,scope=jobs,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: CodeGraphWeb
          file: CodeGraphWeb/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: publish
    environment: production
    if: ${{ vars.CODEGRAPH_DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.CODEGRAPH_DEPLOY_SSH_KEY }}" > ~/.ssh/codegraph_deploy
          chmod 600 ~/.ssh/codegraph_deploy
          ssh-keyscan -H "${{ secrets.CODEGRAPH_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync deployment files
        run: |
          printf '%s\n' "${{ secrets.CODEGRAPH_PROD_ENV }}" > .env.production
          ssh -i ~/.ssh/codegraph_deploy "${{ secrets.CODEGRAPH_DEPLOY_USER }}@${{ secrets.CODEGRAPH_DEPLOY_HOST }}" "mkdir -p '${{ secrets.CODEGRAPH_DEPLOY_PATH }}'"
          scp -i ~/.ssh/codegraph_deploy docker-compose.yml deploy/docker-compose.production.yml "${{ secrets.CODEGRAPH_DEPLOY_USER }}@${{ secrets.CODEGRAPH_DEPLOY_HOST }}:${{ secrets.CODEGRAPH_DEPLOY_PATH }}/"
          scp -i ~/.ssh/codegraph_deploy .env.production "${{ secrets.CODEGRAPH_DEPLOY_USER }}@${{ secrets.CODEGRAPH_DEPLOY_HOST }}:${{ secrets.CODEGRAPH_DEPLOY_PATH }}/.env"

      - name: Deploy over SSH
        env:
          IMAGE_TAG: ${{ needs.publish.outputs.image-tag }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/codegraph_deploy "${{ secrets.CODEGRAPH_DEPLOY_USER }}@${{ secrets.CODEGRAPH_DEPLOY_HOST }}" \
            "cd '${{ secrets.CODEGRAPH_DEPLOY_PATH }}' && \
             echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin && \
             IMAGE_PREFIX='$IMAGE_PREFIX' IMAGE_TAG='$IMAGE_TAG' docker compose -f docker-compose.yml -f docker-compose.production.yml pull && \
             IMAGE_PREFIX='$IMAGE_PREFIX' IMAGE_TAG='$IMAGE_TAG' docker compose -f docker-compose.yml -f docker-compose.production.yml up -d --no-build --remove-orphans"
