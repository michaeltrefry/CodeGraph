      CodeGraph__AnalysisOptions__LmStudio__Model: ${CodeGraph__AnalysisOptions__LmStudio__Model:-}
      CodeGraph__AnalysisOptions__LmStudio__TimeoutSeconds: ${CodeGraph__AnalysisOptions__LmStudio__TimeoutSeconds:-300}
      CodeGraph__AnalysisOptions__LmStudio__MaxConcurrentRequests: ${CodeGraph__AnalysisOptions__LmStudio__MaxConcurrentRequests:-1}
      CodeGraph__AnalysisOptions__LmStudio__DirectFallbackMaxAttempts: ${CodeGraph__AnalysisOptions__LmStudio__DirectFallbackMaxAttempts:-3}
      CodeGraph__AnalysisOptions__LmStudio__UseJsonObjectResponseFormat: ${CodeGraph__AnalysisOptions__LmStudio__UseJsonObjectResponseFormat:-false}
