services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5037:5037"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      CodeGraph__TsPort: ${CodeGraph__TsPort:-3100}
      CodeGraph__StorageOptions__Neo4jUri: ${CodeGraph__StorageOptions__Neo4jUri:-bolt://neo4j:7687}
      CodeGraph__StorageOptions__Neo4jUsername: ${CodeGraph__StorageOptions__Neo4jUsername:-neo4j}
      CodeGraph__StorageOptions__Neo4jPassword: ${CodeGraph__StorageOptions__Neo4jPassword:-codegraph}
      CodeGraph__StorageOptions__Neo4jDatabase: ${CodeGraph__StorageOptions__Neo4jDatabase:-neo4j}
      CodeGraph__StorageOptions__EmbeddingModelName: ${CodeGraph__StorageOptions__EmbeddingModelName:-all-MiniLM-L6-v2}
      CodeGraph__StorageOptions__EmbeddingModelPath: ${CodeGraph__StorageOptions__EmbeddingModelPath:-/models/embeddings/all-MiniLM-L6-v2/model.onnx}
      CodeGraph__AnalysisOptions__DefaultProvider: ${CodeGraph__AnalysisOptions__DefaultProvider:-local}
      CodeGraph__AnalysisOptions__Model: ${CodeGraph__AnalysisOptions__Model:-claude-sonnet-4-6}
      CodeGraph__AnalysisOptions__ApiKey: ${CodeGraph__AnalysisOptions__ApiKey:-}
      CodeGraph__AnalysisOptions__Assistant__Provider: ${CodeGraph__AnalysisOptions__Assistant__Provider:-anthropic}
      CodeGraph__AnalysisOptions__Assistant__Model: ${CodeGraph__AnalysisOptions__Assistant__Model:-}
      CodeGraph__AnalysisOptions__Assistant__MaxTokens: ${CodeGraph__AnalysisOptions__Assistant__MaxTokens:-10000}
      CodeGraph__AnalysisOptions__Assistant__MaxTurns: ${CodeGraph__AnalysisOptions__Assistant__MaxTurns:-10}
      CodeGraph__AnalysisOptions__Assistant__Anthropic__ApiKey: ${CodeGraph__AnalysisOptions__Assistant__Anthropic__ApiKey:-}
      CodeGraph__AnalysisOptions__Assistant__Anthropic__BaseUrl: ${CodeGraph__AnalysisOptions__Assistant__Anthropic__BaseUrl:-}
      CodeGraph__AnalysisOptions__Assistant__OpenAi__ApiKey: ${CodeGraph__AnalysisOptions__Assistant__OpenAi__ApiKey:-}
      CodeGraph__AnalysisOptions__Assistant__OpenAi__BaseUrl: ${CodeGraph__AnalysisOptions__Assistant__OpenAi__BaseUrl:-}
      CodeGraph__AnalysisOptions__Assistant__OpenAi__ChatCompletionsPath: ${CodeGraph__AnalysisOptions__Assistant__OpenAi__ChatCompletionsPath:-}
      CodeGraph__AnalysisOptions__Assistant__OpenAi__Organization: ${CodeGraph__AnalysisOptions__Assistant__OpenAi__Organization:-}
      CodeGraph__AnalysisOptions__Assistant__OpenAi__Project: ${CodeGraph__AnalysisOptions__Assistant__OpenAi__Project:-}
      CodeGraph__AnalysisOptions__Assistant__Local__ApiKey: ${CodeGraph__AnalysisOptions__Assistant__Local__ApiKey:-}
      CodeGraph__AnalysisOptions__Assistant__Local__BaseUrl: ${CodeGraph__AnalysisOptions__Assistant__Local__BaseUrl:-}
      CodeGraph__AnalysisOptions__Assistant__Local__ChatCompletionsPath: ${CodeGraph__AnalysisOptions__Assistant__Local__ChatCompletionsPath:-}
      CodeGraph__AnalysisOptions__OpenAi__ApiKey: ${CodeGraph__AnalysisOptions__OpenAi__ApiKey:-}
      CodeGraph__AnalysisOptions__OpenAi__BaseUrl: ${CodeGraph__AnalysisOptions__OpenAi__BaseUrl:-https://api.openai.com/v1}
      CodeGraph__AnalysisOptions__OpenAi__Model: ${CodeGraph__AnalysisOptions__OpenAi__Model:-gpt-5}
      CodeGraph__AnalysisOptions__Gemini__ApiKey: ${CodeGraph__AnalysisOptions__Gemini__ApiKey:-}
      CodeGraph__AnalysisOptions__Gemini__BaseUrl: ${CodeGraph__AnalysisOptions__Gemini__BaseUrl:-https://generativelanguage.googleapis.com/v1beta}
      CodeGraph__AnalysisOptions__Gemini__Model: ${CodeGraph__AnalysisOptions__Gemini__Model:-gemini-2.5-flash}
      CodeGraph__AnalysisOptions__Local__ApiKey: ${CodeGraph__AnalysisOptions__Local__ApiKey:-}
      CodeGraph__AnalysisOptions__Local__BaseUrl: ${CodeGraph__AnalysisOptions__Local__BaseUrl:-http://host.docker.internal:1234/v1}
      CodeGraph__AnalysisOptions__Local__Model: ${CodeGraph__AnalysisOptions__Local__Model:-}
      CodeGraph__AnalysisOptions__Local__TimeoutSeconds: ${CodeGraph__AnalysisOptions__Local__TimeoutSeconds:-300}
      CodeGraph__AnalysisOptions__Local__MaxConcurrentRequests: ${CodeGraph__AnalysisOptions__Local__MaxConcurrentRequests:-1}
      CodeGraph__AnalysisOptions__Local__DirectFallbackMaxAttempts: ${CodeGraph__AnalysisOptions__Local__DirectFallbackMaxAttempts:-3}
      CodeGraph__AnalysisOptions__Local__UseJsonObjectResponseFormat: ${CodeGraph__AnalysisOptions__Local__UseJsonObjectResponseFormat:-false}
      CodeGraph__AnalysisOptions__Local__MaxSourceChars: ${CodeGraph__AnalysisOptions__Local__MaxSourceChars:-32000}
      CodeGraph__AnalysisOptions__Local__MaxPromptNodes: ${CodeGraph__AnalysisOptions__Local__MaxPromptNodes:-80}
      CodeGraph__AnalysisOptions__Local__MaxRelationshipTargetsPerType: ${CodeGraph__AnalysisOptions__Local__MaxRelationshipTargetsPerType:-8}
      CodeGraph__RabbitMqOptions__Host: ${CodeGraph__RabbitMqOptions__Host:-rabbitmq}
      CodeGraph__RabbitMqOptions__Username: ${CodeGraph__RabbitMqOptions__Username:-guest}
      CodeGraph__RabbitMqOptions__Password: ${CodeGraph__RabbitMqOptions__Password:-guest}
      CodeGraph__RepositorySource__Provider: ${CodeGraph__RepositorySource__Provider:-Folder}
      CodeGraph__RepositorySource__ReposCachePath: ${CodeGraph__RepositorySource__ReposCachePath:-/repos/.cache}
      CodeGraph__RepositorySource__Folder__RootPath: ${CodeGraph__RepositorySource__Folder__RootPath:-/repos}
      CodeGraph__RepositorySource__GitLab__BaseUrl: ${CodeGraph__RepositorySource__GitLab__BaseUrl:-https://gitlab.example.com/}
      CodeGraph__RepositorySource__GitLab__PrivateToken: ${CodeGraph__RepositorySource__GitLab__PrivateToken:-}
      CodeGraph__RepositorySource__GitHub__BaseUrl: ${CodeGraph__RepositorySource__GitHub__BaseUrl:-https://api.github.com}
      CodeGraph__RepositorySource__GitHub__PersonalAccessToken: ${CodeGraph__RepositorySource__GitHub__PersonalAccessToken:-}
      CodeGraph__RepositorySource__GitHub__Organization: ${CodeGraph__RepositorySource__GitHub__Organization:-}
      CodeGraph__AuthOptions__AdminApiKey: ${CodeGraph__AuthOptions__AdminApiKey:-}
      CodeGraph__AuthOptions__AdminApiKeyHeaderName: ${CodeGraph__AuthOptions__AdminApiKeyHeaderName:-X-CodeGraph-Admin-Key}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - repos_cache:/repos/.cache
      - ${CODEGRAPH_DOCKER_MODELS_MOUNT:-./.cache/models}:/models
      - ${CODEGRAPH_DOCKER_LEGACY_MODELS_MOUNT:-../llm/models}:/models-legacy
    depends_on:
      rabbitmq:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  jobs:
    build:
      context: .
      dockerfile: Dockerfile.jobs
    environment:
      DOTNET_ENVIRONMENT: ${DOTNET_ENVIRONMENT:-Development}
      CodeGraph__StorageOptions__Neo4jUri: ${CodeGraph__StorageOptions__Neo4jUri:-bolt://neo4j:7687}
      CodeGraph__StorageOptions__Neo4jUsername: ${CodeGraph__StorageOptions__Neo4jUsername:-neo4j}
      CodeGraph__StorageOptions__Neo4jPassword: ${CodeGraph__StorageOptions__Neo4jPassword:-codegraph}
      CodeGraph__StorageOptions__Neo4jDatabase: ${CodeGraph__StorageOptions__Neo4jDatabase:-neo4j}
      CodeGraph__AnalysisOptions__DefaultProvider: ${CodeGraph__AnalysisOptions__DefaultProvider:-local}
      CodeGraph__AnalysisOptions__Model: ${CodeGraph__AnalysisOptions__Model:-claude-sonnet-4-6}
      CodeGraph__AnalysisOptions__ApiKey: ${CodeGraph__AnalysisOptions__ApiKey:-}
      CodeGraph__AnalysisOptions__Assistant__Provider: ${CodeGraph__AnalysisOptions__Assistant__Provider:-anthropic}
      CodeGraph__AnalysisOptions__Assistant__Model: ${CodeGraph__AnalysisOptions__Assistant__Model:-}
      CodeGraph__AnalysisOptions__Assistant__MaxTokens: ${CodeGraph__AnalysisOptions__Assistant__MaxTokens:-10000}
      CodeGraph__AnalysisOptions__Assistant__MaxTurns: ${CodeGraph__AnalysisOptions__Assistant__MaxTurns:-10}
      CodeGraph__AnalysisOptions__Assistant__Anthropic__ApiKey: ${CodeGraph__AnalysisOptions__Assistant__Anthropic__ApiKey:-}
      CodeGraph__AnalysisOptions__Assistant__Anthropic__BaseUrl: ${CodeGraph__AnalysisOptions__Assistant__Anthropic__BaseUrl:-}
      CodeGraph__AnalysisOptions__Assistant__OpenAi__ApiKey: ${CodeGraph__AnalysisOptions__Assistant__OpenAi__ApiKey:-}
      CodeGraph__AnalysisOptions__Assistant__OpenAi__BaseUrl: ${CodeGraph__AnalysisOptions__Assistant__OpenAi__BaseUrl:-}
      CodeGraph__AnalysisOptions__Assistant__OpenAi__ChatCompletionsPath: ${CodeGraph__AnalysisOptions__Assistant__OpenAi__ChatCompletionsPath:-}
      CodeGraph__AnalysisOptions__Assistant__OpenAi__Organization: ${CodeGraph__AnalysisOptions__Assistant__OpenAi__Organization:-}
      CodeGraph__AnalysisOptions__Assistant__OpenAi__Project: ${CodeGraph__AnalysisOptions__Assistant__OpenAi__Project:-}
      CodeGraph__AnalysisOptions__Assistant__Local__ApiKey: ${CodeGraph__AnalysisOptions__Assistant__Local__ApiKey:-}
      CodeGraph__AnalysisOptions__Assistant__Local__BaseUrl: ${CodeGraph__AnalysisOptions__Assistant__Local__BaseUrl:-}
      CodeGraph__AnalysisOptions__Assistant__Local__ChatCompletionsPath: ${CodeGraph__AnalysisOptions__Assistant__Local__ChatCompletionsPath:-}
      CodeGraph__AnalysisOptions__OpenAi__ApiKey: ${CodeGraph__AnalysisOptions__OpenAi__ApiKey:-}
      CodeGraph__AnalysisOptions__OpenAi__BaseUrl: ${CodeGraph__AnalysisOptions__OpenAi__BaseUrl:-https://api.openai.com/v1}
      CodeGraph__AnalysisOptions__OpenAi__Model: ${CodeGraph__AnalysisOptions__OpenAi__Model:-gpt-5}
      CodeGraph__AnalysisOptions__Gemini__ApiKey: ${CodeGraph__AnalysisOptions__Gemini__ApiKey:-}
      CodeGraph__AnalysisOptions__Gemini__BaseUrl: ${CodeGraph__AnalysisOptions__Gemini__BaseUrl:-https://generativelanguage.googleapis.com/v1beta}
      CodeGraph__AnalysisOptions__Gemini__Model: ${CodeGraph__AnalysisOptions__Gemini__Model:-gemini-2.5-flash}
      CodeGraph__AnalysisOptions__Local__ApiKey: ${CodeGraph__AnalysisOptions__Local__ApiKey:-}
      CodeGraph__AnalysisOptions__Local__BaseUrl: ${CodeGraph__AnalysisOptions__Local__BaseUrl:-http://host.docker.internal:1234/v1}
      CodeGraph__AnalysisOptions__Local__Model: ${CodeGraph__AnalysisOptions__Local__Model:-}
      CodeGraph__AnalysisOptions__Local__TimeoutSeconds: ${CodeGraph__AnalysisOptions__Local__TimeoutSeconds:-300}
      CodeGraph__AnalysisOptions__Local__MaxConcurrentRequests: ${CodeGraph__AnalysisOptions__Local__MaxConcurrentRequests:-1}
      CodeGraph__AnalysisOptions__Local__DirectFallbackMaxAttempts: ${CodeGraph__AnalysisOptions__Local__DirectFallbackMaxAttempts:-3}
      CodeGraph__AnalysisOptions__Local__UseJsonObjectResponseFormat: ${CodeGraph__AnalysisOptions__Local__UseJsonObjectResponseFormat:-false}
      CodeGraph__AnalysisOptions__Local__MaxSourceChars: ${CodeGraph__AnalysisOptions__Local__MaxSourceChars:-32000}
      CodeGraph__AnalysisOptions__Local__MaxPromptNodes: ${CodeGraph__AnalysisOptions__Local__MaxPromptNodes:-80}
      CodeGraph__AnalysisOptions__Local__MaxRelationshipTargetsPerType: ${CodeGraph__AnalysisOptions__Local__MaxRelationshipTargetsPerType:-8}
      CodeGraph__RabbitMqOptions__Host: ${CodeGraph__RabbitMqOptions__Host:-rabbitmq}
      CodeGraph__RabbitMqOptions__Username: ${CodeGraph__RabbitMqOptions__Username:-guest}
      CodeGraph__RabbitMqOptions__Password: ${CodeGraph__RabbitMqOptions__Password:-guest}
      CodeGraph__RepositorySource__Provider: ${CodeGraph__RepositorySource__Provider:-Folder}
      CodeGraph__RepositorySource__ReposCachePath: ${CodeGraph__RepositorySource__ReposCachePath:-/repos/.cache}
      CodeGraph__RepositorySource__Folder__RootPath: ${CodeGraph__RepositorySource__Folder__RootPath:-/repos}
      CodeGraph__RepositorySource__GitLab__BaseUrl: ${CodeGraph__RepositorySource__GitLab__BaseUrl:-https://gitlab.example.com/}
      CodeGraph__RepositorySource__GitLab__PrivateToken: ${CodeGraph__RepositorySource__GitLab__PrivateToken:-}
      CodeGraph__RepositorySource__GitHub__BaseUrl: ${CodeGraph__RepositorySource__GitHub__BaseUrl:-https://api.github.com}
      CodeGraph__RepositorySource__GitHub__PersonalAccessToken: ${CodeGraph__RepositorySource__GitHub__PersonalAccessToken:-}
      CodeGraph__RepositorySource__GitHub__Organization: ${CodeGraph__RepositorySource__GitHub__Organization:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - repos_cache:/repos/.cache
    depends_on:
      rabbitmq:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  rabbitmq:
    image: ${CODEGRAPH_DOCKER_RABBITMQ_IMAGE:-masstransit/rabbitmq}
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${CodeGraph__RabbitMqOptions__Username:-guest}
      - RABBITMQ_DEFAULT_PASS=${CodeGraph__RabbitMqOptions__Password:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${CodeGraph__StorageOptions__Neo4jUsername:-neo4j}/${CodeGraph__StorageOptions__Neo4jPassword:-codegraph}
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
    volumes:
      - ${CODEGRAPH_DOCKER_NEO4J_DATA_MOUNT:-./.cache/neo4j/data}:/data
      - ${CODEGRAPH_DOCKER_NEO4J_LOGS_MOUNT:-./.cache/neo4j/logs}:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: ./CodeGraphWeb
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  repos_cache:
  rabbitmq_data:
