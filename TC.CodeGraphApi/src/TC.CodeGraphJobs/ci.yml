.proj_jobs_vars:
  variables:
    PROJ_PATH: src/TC.CodeGraphJobs
    DOTNETAPP_PORT: 5038

.proj_jobs_dependencies:
  - $PROJ_PATH/**/*
  - src/TC.CodeGraphApi.Data/**/*
  - src/TC.CodeGraphApi.Models/**/*
  - src/TC.CodeGraphApi.Services/**/*

.proj_jobs_rules:
  rules:
    - changes: !reference [.proj_jobs_dependencies]

.proj_jobs:
  extends:
    - .proj_jobs_vars
    - .proj_jobs_rules

preversion_jobs:
  extends:
    - .preversion_app_template
    - .proj_jobs_vars

version_jobs:
  extends:
    - .version_template
    - .proj_jobs

package_jobs:
  extends:
    - .package_app_linux_template
    - .proj_jobs

deploy_jobs:
  extends:
    - .deploy
    - .proj_jobs_vars
  rules:
    - if: '$CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH'
      changes: !reference ['.proj_jobs_dependencies']
      when: manual
      allow_failure: true
    - if: '$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH'
      changes: !reference ['.proj_jobs_dependencies']
      when: on_success
  trigger:
    include: "${PROJ_PATH}/deploy.yml"
    strategy: depend

proget_scan_jobs:
  extends:
    - .proget
    - .proj_jobs_vars
